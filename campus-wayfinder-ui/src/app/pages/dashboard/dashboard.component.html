<div class="header bg-gradient-dark pb-6 pt-6">
  <div class="container-fluid">
    <div class="header-body text-center">
      <h1 class="text-white mb-4">Welcome, Campus Admin!</h1>
      <h3 class="text-light">Manage Events & Enhance Campus Navigation</h3>
      <p class="text-muted mt-3">"Your contributions help keep our campus vibrant and organized."</p>
    </div>
  </div>
</div>

<div class="container-fluid mt-5">
  <div class="row">
    <!-- Total Upcoming Events -->
    <div class="col-lg-6 mb-4">
      <div class="card shadow border-0 custom-stat-card">
        <div class="card-body text-center">
          <div class="icon icon-shape bg-primary text-white rounded-circle mb-3 mx-auto">
            <i class="fas fa-calendar-alt"></i>
          </div>
          <h5 class="card-title text-uppercase text-muted">Total Upcoming Events</h5>
          <span class="h2 font-weight-bold">{{ upcomingEventsCount }}</span>
        </div>
      </div>
    </div>

    <!-- Active Locations -->
    <div class="col-lg-6 mb-4">
      <div class="card shadow border-0 custom-stat-card">
        <div class="card-body text-center">
          <div class="icon icon-shape bg-success text-white rounded-circle mb-3 mx-auto">
            <i class="fas fa-map-marker-alt"></i>
          </div>
          <h5 class="card-title text-uppercase text-muted">Active Locations</h5>
          <span class="h2 font-weight-bold">{{ activeLocationsCount }}</span>
        </div>
      </div>
    </div>
  </div>
</div>
