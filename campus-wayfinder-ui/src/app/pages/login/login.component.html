<!-- Page content with background image -->
<div class="container-fluid position-relative p-0" style="min-height: 100vh; background: url('assets/img/brand/back3.jpg') no-repeat center center/cover;">
  <div class="row justify-content-center align-items-center" style="min-height: 100vh;">
    <div class="col-lg-6 col-md-8 col-sm-10 mt-5 mb-5">
      <div class="card shadow-lg border-0" style="background: rgba(255, 255, 255, 0.9); border-radius: 15px;">
        <!-- Card Header with Logo and Welcome Message -->
        <div class="card-header text-center p-4" style="background-color: #004d40; border-top-left-radius: 15px; border-top-right-radius: 15px;">
          <img src="assets/img/brand/aui_2.png" class="navbar-brand-img mb-3" style="max-width: 80px;" alt="Al Akhawayn University">
          <h2 class="text-white">Welcome to Al Akhawayn University</h2>
          <p class="text-light mb-0">Sign in to manage the campus system.</p>
        </div>

        <!-- Card Body -->
        <div class="card-body px-lg-5 py-lg-4">
          <div class="text-center text-muted mb-4">
            <small>Sign in with your credentials</small>
          </div>
          <form (ngSubmit)="login()" #loginForm="ngForm">
            <!-- Email Input -->
            <div class="form-group mb-3">
              <div class="input-group input-group-alternative">
                <div class="input-group-prepend">
                  <span class="input-group-text bg-light"><i class="ni ni-email-83 text-success"></i></span>
                </div>
                <input [(ngModel)]="admin.email" id="email" name="email" class="form-control" placeholder="Email" type="email" required #email="ngModel">
              </div>
              <div *ngIf="email.invalid && (email.dirty || email.touched)" class="text-danger small">
                A valid email address is required.
              </div>
            </div>
            <!-- Password Input -->
            <div class="form-group mb-3">
              <div class="input-group input-group-alternative">
                <div class="input-group-prepend">
                  <span class="input-group-text bg-light"><i class="ni ni-lock-circle-open text-success"></i></span>
                </div>
                <input [(ngModel)]="admin.password" id="password" name="password" class="form-control" placeholder="Password" type="password" required #password="ngModel">
              </div>
              <div *ngIf="password.invalid && (password.dirty || password.touched)" class="text-danger small">
                Password is required.
              </div>
            </div>
            <!-- Remember Me Checkbox -->
            <div class="custom-control custom-control-alternative custom-checkbox mb-3">
              <input class="custom-control-input" id="customCheckLogin" type="checkbox">
              <label class="custom-control-label" for="customCheckLogin">
                <span class="text-muted">Remember me</span>
              </label>
            </div>
            <!-- Submit Button -->
            <div class="text-center">
              <button type="submit" class="btn btn-success my-4 w-100" [disabled]="loginForm.invalid">Sign in</button>
            </div>
            <!-- Backend Error Message -->
            <div *ngIf="errorMessage" class="text-danger text-center mt-3">
              {{ errorMessage }}
            </div>
          </form>
          <!-- Link to Register Page -->
          <div class="text-center mt-3">
            <small class="text-muted">Don't have an account? <a [routerLink]="['/register']" class="text-success font-weight-bold">Click here to register</a></small>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Add CSS for Styling -->
<style>
  /* Hide arrows from number input */
  input[type="number"].no-arrow {
    -moz-appearance: textfield;
  }
  input[type="number"].no-arrow::-webkit-outer-spin-button,
  input[type="number"].no-arrow::-webkit-inner-spin-button {
    -webkit-appearance: none;
    margin: 0;
  }
</style>
