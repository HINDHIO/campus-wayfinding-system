<div class="container-fluid position-relative p-0" style="min-height: 100vh; background: url('assets/img/brand/back3.jpg') no-repeat center center/cover;">
  <div class="row justify-content-center align-items-center" style="min-height: 100vh;">
    <div class="col-lg-8 col-md-10 col-sm-12 mt-5 mb-5">
      <div class="card shadow-lg border-0" style="background: rgba(255, 255, 255, 0.9); border-radius: 15px;">
        <div class="card-header text-center p-4" style="background-color: #004d40; border-top-left-radius: 15px; border-top-right-radius: 15px;">
          <img src="assets/img/brand/aui_2.png" class="navbar-brand-img mb-3" style="max-width: 100px;" alt="Al Akhawayn University">
          <h2 class="text-white">Choose Your Mode</h2>
          <p class="text-light mb-0">Select whether you're an Admin or a User to proceed.</p>
        </div>
        <div class="card-body px-lg-5 py-lg-5 text-center">
          <div class="row">
            <div class="col-12 mb-4">
              <button class="btn btn-success btn-lg btn-block" (click)="selectAdmin()">
                <i class="ni ni-settings-gear-65"></i> Admin Login
              </button>
            </div>
            <div class="col-12">
              <button class="btn btn-primary btn-lg btn-block" (click)="selectUser()">
                <i class="ni ni-user-run"></i> User Mode
              </button>
            </div>
          </div>
          <div *ngIf="isLoading" class="loading-overlay">
            <p>Loading...</p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
